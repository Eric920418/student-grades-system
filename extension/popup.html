<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <style>
    body { width: 300px; font-family: system-ui, sans-serif; padding: 14px; }
    h1 { font-size: 15px; margin: 0 0 6px; }
    p { font-size: 12px; color: #555; margin: 0 0 10px; line-height: 1.5; }
    button { width: 100%; padding: 9px; font-size: 14px; font-weight: 600; color: #fff;
      background: #2563eb; border: 0; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    button.green { background: #059669; }
    select { width: 100%; padding: 7px; font-size: 13px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 6px; }
    .msg { margin-top: 8px; font-size: 12px; white-space: pre-line; }
    .ok { color: #047857; } .err { color: #b91c1c; }
    hr { border: 0; border-top: 1px solid #eee; margin: 16px 0; }
    a { font-size: 12px; color: #2563eb; }
  </style>
</head>
<body>
  <h1>① 同步課程＋名單</h1>
  <p>先在 Chrome 登入 portalx，按下方自動爬取所有課程與名單。</p>
  <button id="sync">🔄 同步課程到成績系統</button>
  <div id="msg" class="msg"></div>

  <hr />

  <h1>② 填成績到目前頁</h1>
  <p>先進到 portalx <strong>成績登錄頁</strong>，選課程與成績項目按填入＝<strong>等同貼舊腳本按 Enter</strong>（省去複製貼上）。<strong>只填不送出</strong>，填完會跳出統計，請核對後自行在 portal 按儲存/送出。</p>
  <select id="course"><option value="">載入課程中…</option></select>
  <select id="item"><option value="">先選課程</option></select>
  <button id="fill" class="green" disabled>✍️ 填入成績（不送出）</button>
  <div id="fillmsg" class="msg"></div>

  <p style="margin-top:12px"><a id="opt" href="#">設定（App 網址 / 配對 token）</a></p>
  <script src="popup.js"></script>
</body>
</html>
